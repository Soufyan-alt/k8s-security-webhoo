apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-webapp
  labels:
    app: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      containers:
        - name: web-server
          image: docker.io/library/nginx:latest
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          ports:
            - containerPort: 80
